<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chronos Notes CMS</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>body{margin:0;background:#f5efe5;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
</head>
<body>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user && window.location.hash && window.location.hash.includes('invite_token')) {
          window.netlifyIdentity.open('signup');
        }
        if (!user && window.location.hash && window.location.hash.includes('recovery_token')) {
          window.netlifyIdentity.open('recovery');
        }
      });
      window.netlifyIdentity.on('login', () => {
        document.location.href = '/admin/';
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
